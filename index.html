<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>أَبْطَالٌ فِي الظِّلِّ — سِيَرُ الجُنُودِ المَجْهُولِينَ</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#A8CC40">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="أبطال في الظل">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Cairo:wght@400;600;700;800&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════════ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Cairo',sans-serif;background:#060E1A;color:#E8F0C8;min-height:100vh;overflow-x:hidden}
:root{
  --gold:#C8A830;--gold-light:#E8CC60;--green:#5A8C28;--green-light:#7ABE3C;
  --navy:#060E1A;--navy-mid:#0E1E2E;--navy-soft:#162440;
  --cream:#F5F8E8;--text-dark:#0D1808;
  --accent:#A8CC40;--accent-soft:rgba(168,204,64,.15);
}

/* ═══════════════════════════════════════════════
   CANVAS STARS
═══════════════════════════════════════════════ */
#stars-bg{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ═══════════════════════════════════════════════
   HOME SCREEN
═══════════════════════════════════════════════ */
#home{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;padding-bottom:40px}
.home-header{padding:32px 24px 0;text-align:center}
.home-brand{font-family:'Aref Ruqaa',serif;font-size:clamp(28px,6vw,46px);color:var(--gold-light);text-shadow:0 0 30px rgba(200,168,48,.45);line-height:1.2}
.home-tagline{font-family:'Cairo',sans-serif;font-size:clamp(12px,2.4vw,16px);color:rgba(212,232,160,.6);margin-top:8px;font-weight:600;line-height:1.5}
.home-section-title{font-family:'Cairo',sans-serif;font-weight:800;font-size:clamp(14px,2.6vw,18px);color:var(--accent);padding:22px 20px 10px;letter-spacing:.5px}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(160px,46%),1fr));gap:14px;padding:0 16px 60px}
.story-card{background:linear-gradient(145deg,rgba(14,30,46,.95),rgba(22,36,64,.9));border:1px solid rgba(168,204,64,.2);border-radius:16px;padding:0;cursor:pointer;transition:transform .2s,border-color .2s,box-shadow .2s;user-select:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation;text-align:right;overflow:hidden;position:relative}
.story-card::before{content:'';position:absolute;inset:0;border-radius:16px;background:linear-gradient(145deg,rgba(168,204,64,.04),transparent);opacity:0;transition:opacity .2s;z-index:1;pointer-events:none}
.story-card:hover{transform:translateY(-3px);border-color:rgba(168,204,64,.45);box-shadow:0 8px 24px rgba(0,0,0,.4)}
.story-card:hover::before{opacity:1}
.story-card:active{transform:scale(.97)}
.card-img-wrap{position:relative;width:100%;aspect-ratio:3/2;overflow:hidden;border-radius:10px 10px 0 0}
.card-img{width:100%;height:100%;object-fit:cover;display:block;opacity:.85}
.card-img-tint{position:absolute;inset:0;border-radius:10px 10px 0 0}
.card-body{padding:10px 12px 12px;position:relative;z-index:2}
.card-badge{display:inline-block;font-size:10px;font-weight:700;color:var(--accent);background:rgba(168,204,64,.1);border:1px solid rgba(168,204,64,.25);border-radius:20px;padding:2px 10px;margin-bottom:6px}
.card-title{font-family:'Cairo',sans-serif;font-weight:800;font-size:clamp(14px,2.8vw,18px);color:#E8F0C8;line-height:1.35;margin-bottom:4px}
.card-subtitle{font-family:'Cairo',sans-serif;font-size:clamp(11px,2vw,13px);color:rgba(212,232,160,.55);line-height:1.4}
.card-intro{
  grid-column:1/-1;
  background:linear-gradient(135deg,rgba(20,38,10,.97) 0%,rgba(10,20,40,.97) 100%);
  border:2px solid rgba(200,168,48,.55);
  border-radius:20px;
  padding:0;
  overflow:hidden;
  box-shadow:0 6px 32px rgba(0,0,0,.5),0 0 0 1px rgba(200,168,48,.1);
}
.card-intro:hover{transform:translateY(-4px);border-color:rgba(200,168,48,.85);box-shadow:0 12px 40px rgba(0,0,0,.6),0 0 24px rgba(200,168,48,.15)}
.card-intro-inner{display:flex;gap:0;height:clamp(130px,22vw,180px)}
.card-intro-img{flex-shrink:0;width:clamp(120px,30%,200px);position:relative;overflow:hidden}
.card-intro-img img{width:100%;height:100%;object-fit:cover;display:block;opacity:.8;filter:brightness(.9) saturate(1.1)}
.card-intro-img::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent 60%,rgba(20,38,10,.95))}
.card-intro-body{flex:1;padding:clamp(14px,3vw,22px) clamp(14px,3vw,22px) clamp(14px,3vw,22px) 0;display:flex;flex-direction:column;justify-content:center;text-align:right}
.card-intro-badge{display:inline-block;font-size:11px;font-weight:700;color:var(--gold);background:rgba(200,168,48,.12);border:1px solid rgba(200,168,48,.4);border-radius:20px;padding:3px 12px;margin-bottom:8px;letter-spacing:.3px}
.card-intro-title{font-family:'Aref Ruqaa',serif;font-weight:700;font-size:clamp(20px,4.5vw,32px);color:var(--gold-light);line-height:1.2;margin-bottom:6px;text-shadow:0 0 20px rgba(200,168,48,.35)}
.card-intro-sub{font-family:'Cairo',sans-serif;font-size:clamp(11px,2vw,14px);color:rgba(212,232,160,.65);line-height:1.5;margin-bottom:10px}
.card-intro-cta{display:inline-flex;align-items:center;gap:6px;font-family:'Cairo',sans-serif;font-size:clamp(11px,2vw,13px);font-weight:700;color:var(--gold-light);background:rgba(200,168,48,.12);border:1px solid rgba(200,168,48,.35);border-radius:20px;padding:5px 14px;width:fit-content}
.card-intro .card-badge{display:none}
.card-intro .card-title{display:none}
.card-intro .card-subtitle{display:none}
.card-intro .card-img{display:none}

/* ═══════════════════════════════════════════════
   STORY VIEWER (fullscreen)
═══════════════════════════════════════════════ */
#viewer{display:none;position:fixed;inset:0;z-index:100;background:linear-gradient(180deg,#040C18 0%,#0E1E08 55%,#6A7C10 100%);flex-direction:column;height:100vh;height:100dvh;overflow:hidden}
#viewer.open{display:flex}
.viewer-topbar{display:flex;align-items:center;gap:6px;padding:10px 12px 4px;flex-shrink:0;min-height:44px}
.v-back{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:#D4E8A0;-webkit-tap-highlight-color:transparent;touch-action:manipulation;transition:background .2s;flex-shrink:0}
.v-back:active{transform:scale(.9)}
.v-series{font-family:'Cairo',sans-serif;font-size:11px;font-weight:700;color:var(--accent);margin-left:auto;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:35%}
.v-counter{font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;color:var(--accent);background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:1px 10px;white-space:nowrap;flex-shrink:0}
.v-tts{font-size:12px;font-weight:700;background:rgba(168,204,64,.15);border:2px solid rgba(168,204,64,.6);border-radius:20px;padding:4px 12px;cursor:pointer;white-space:nowrap;color:#FFFFFF;-webkit-tap-highlight-color:transparent;transition:border-color .2s,background .2s;touch-action:manipulation;flex-shrink:0}
.v-tts:hover{border-color:var(--accent)}
.v-tts.speaking{animation:ttsGlow .8s ease-in-out infinite alternate}
@keyframes ttsGlow{0%{border-color:rgba(168,204,64,.3)}100%{border-color:var(--accent);box-shadow:0 0 8px rgba(168,204,64,.35)}}
#v-stage{position:relative;flex:1;min-height:0;overflow:hidden;margin:0 10px}
.slide{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .45s ease;overflow:hidden;border-radius:18px}
.slide.active{opacity:1;pointer-events:auto;z-index:5}
/* image panel */
.s-img{flex-shrink:0;position:relative;width:100%;aspect-ratio:8/2.3;border-radius:18px 18px 0 0;overflow:hidden;background:#040C18;border:1px solid rgba(168,204,64,.2);border-bottom:none}
.s-img img{width:100%;height:100%;object-fit:cover;display:block}
.s-img svg{width:100%;height:100%;display:block}
.s-img-overlay{position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,rgba(4,12,24,.6))}
.s-scene-num{position:absolute;top:8px;right:8px;background:var(--accent);color:#040C18;font-family:'Cairo',sans-serif;font-size:11px;font-weight:800;border-radius:8px;padding:1px 8px;direction:ltr;z-index:2}
/* night wrap (full slide — cover/morals/closing) */
.s-night{flex:1;min-height:0;width:100%;border-radius:18px;background:linear-gradient(145deg,rgba(4,12,24,.97) 0%,rgba(14,30,8,.92) 100%);border:1px solid rgba(168,204,64,.22);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:clamp(16px,3vw,32px) clamp(16px,3vw,28px);text-align:center;overflow-y:auto}
/* caption card */
.s-caption{width:100%;flex:1;min-height:0;background:var(--cream);border:1px solid var(--accent);border-top:3px solid var(--accent);border-radius:0 0 18px 18px;padding:clamp(10px,2.5vw,20px) clamp(12px,3vw,22px);overflow-y:auto;display:flex;flex-direction:column}
.s-caption-inner{margin:auto;width:100%;text-align:center}
.s-ar{font-family:'Cairo',sans-serif;font-weight:700;font-size:clamp(16px,3.2vw,24px);line-height:1.65;color:var(--text-dark);margin-bottom:6px}
.s-divider{width:48px;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);margin:4px auto 8px}
.s-en{font-family:'Lora',serif;font-size:clamp(12px,2vw,16px);line-height:1.55;color:#253A10;font-style:italic}
/* hadith box inside caption */
.hadith-wrap{background:rgba(90,140,40,.1);border-right:3px solid var(--green-light);border-radius:4px 10px 10px 4px;padding:10px 14px;margin:8px 0;text-align:right}
.hadith-ar{font-family:'Cairo',sans-serif;font-weight:700;font-size:clamp(14px,2.6vw,19px);color:#1A2808;line-height:1.8}
.hadith-response{font-family:'Cairo',sans-serif;font-weight:700;font-size:clamp(14px,2.5vw,18px);color:var(--green);margin-top:6px;line-height:1.7}
.hadith-src{font-family:'Cairo',sans-serif;font-size:clamp(10px,1.5vw,12px);color:rgba(90,140,40,.6);margin-top:4px}
/* cover slide elements */
.cover-icon{font-size:clamp(50px,11vw,76px);margin-bottom:6px;filter:drop-shadow(0 4px 18px rgba(168,204,64,.4))}
.cover-title{font-family:'Aref Ruqaa',serif;font-weight:700;font-size:clamp(26px,5.5vw,44px);color:#D4E8A0;text-shadow:0 0 22px rgba(168,204,64,.4);margin-bottom:4px;line-height:1.2}
.cover-sub{font-family:'Cairo',sans-serif;font-weight:600;font-size:clamp(13px,2.6vw,19px);color:var(--accent)}
.cover-en{font-family:'Lora',serif;font-size:clamp(12px,2.2vw,16px);color:rgba(212,232,160,.6);font-style:italic;margin:4px 0 8px}
.cover-badge{display:inline-block;font-family:'Cairo',sans-serif;font-size:clamp(10px,1.8vw,13px);font-weight:700;color:#D4E8A0;background:rgba(168,204,64,.12);border:1px solid rgba(168,204,64,.32);border-radius:40px;padding:3px 16px}
.cover-src{font-family:'Cairo',sans-serif;font-size:clamp(10px,1.5vw,12px);color:rgba(212,232,160,.3);margin-top:10px}
/* morals — always inside s-night (dark background) */
.morals-title{font-family:'Cairo',sans-serif;font-weight:800;font-size:clamp(17px,3.4vw,26px);color:#D4E8A0;margin-bottom:12px;text-shadow:0 0 12px rgba(168,204,64,.35)}
.moral-row{display:flex;align-items:flex-start;gap:10px;background:rgba(8,18,4,.6);border:1px solid rgba(168,204,64,.4);border-radius:12px;padding:12px 14px;margin-bottom:8px;text-align:right;width:100%}
.moral-num{font-family:'Cairo',sans-serif;font-weight:800;font-size:15px;color:#A8CC40;flex-shrink:0;width:24px;text-align:center;margin-top:2px;text-shadow:0 0 8px rgba(168,204,64,.5)}
.moral-ar{font-family:'Cairo',sans-serif;font-weight:700;font-size:clamp(14px,2.8vw,20px);color:#FFFFFF;line-height:1.65;text-shadow:0 1px 4px rgba(0,0,0,.5)}
.moral-en{font-family:'Lora',serif;font-size:clamp(12px,2vw,15px);color:rgba(200,230,160,.8);font-style:italic;line-height:1.5;margin-top:3px}
/* closing */
.closing-icon{font-size:clamp(40px,9vw,60px);margin-bottom:6px}
.closing-title{font-family:'Aref Ruqaa',serif;font-weight:700;font-size:clamp(22px,4.5vw,32px);color:#D4E8A0}
.closing-quote{font-family:'Cairo',sans-serif;font-size:clamp(13px,2.4vw,17px);color:rgba(212,232,160,.72);line-height:1.75;margin:10px 0;font-style:italic}
.closing-en{font-family:'Lora',serif;font-size:clamp(12px,2.2vw,16px);color:rgba(212,232,160,.5);font-style:italic}
.home-btn{display:inline-block;margin-top:14px;background:rgba(168,204,64,.12);border:1px solid var(--accent);border-radius:30px;padding:7px 22px;cursor:pointer;font-family:'Cairo',sans-serif;font-weight:700;font-size:clamp(12px,2vw,15px);color:#D4E8A0;transition:background .2s;user-select:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.home-btn:hover{background:rgba(168,204,64,.24)}
.home-btn:active{transform:scale(.96)}
/* intro slide (full-height text) */
.intro-line{font-family:'Cairo',sans-serif;font-weight:700;font-size:clamp(15px,2.8vw,21px);color:#1A2808;line-height:1.7;margin-bottom:4px}
.intro-en{font-family:'Lora',serif;font-size:clamp(11px,2vw,15px);color:#2A4010;font-style:italic;margin-bottom:10px}
/* progress */
.v-progress{display:flex;align-items:center;justify-content:center;gap:4px;padding:5px 0 2px;flex-shrink:0}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(168,204,64,.2);transition:background .3s,transform .3s}
.dot.done{background:rgba(168,204,64,.5)}
.dot.active{background:var(--accent);transform:scale(1.45);box-shadow:0 0 8px rgba(168,204,64,.4)}
/* controls */
.v-controls{display:flex;align-items:center;justify-content:center;gap:14px;padding:6px 0 4px;flex-shrink:0}
.ctrl{background:rgba(168,204,64,.15);border:2px solid rgba(168,204,64,.55);border-radius:50%;width:42px;height:42px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:#FFFFFF;font-weight:700;transition:background .2s,transform .1s,border-color .2s;user-select:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.ctrl:active{transform:scale(.88)}
.ctrl:hover{background:rgba(168,204,64,.3);border-color:rgba(168,204,64,.9)}
.ctrl:disabled{opacity:.25;pointer-events:none}
.ctrl.sm{width:38px;height:38px;font-size:20px}
/* responsive */
@media(max-width:480px){.viewer-topbar{padding:6px 8px 2px}.s-img{aspect-ratio:8/2}.v-controls{gap:10px}.ctrl{width:40px;height:40px;font-size:17px}.ctrl.sm{width:36px;height:36px;font-size:19px}.card-intro-sub{display:none}}
@media(min-width:600px){.cards-grid{grid-template-columns:repeat(3,1fr)}.card-intro-inner{height:clamp(150px,18vw,200px)}}
@media(min-width:900px){.cards-grid{grid-template-columns:repeat(4,1fr);max-width:960px;margin:0 auto}.card-intro-inner{height:170px}}
@media(max-height:650px){.s-img{aspect-ratio:8/1.8}.s-caption{padding:7px 10px}.s-night{padding:10px 12px}.v-controls{padding:0;gap:8px}.ctrl{width:30px;height:30px;font-size:13px}.v-progress{padding:2px 0}.s-ar{font-size:clamp(14px,2.8vw,19px)}}
/* source line */
.src-line{font-family:'Cairo',sans-serif;font-size:clamp(9px,1.4vw,11px);color:rgba(212,232,160,.3);margin-top:8px}
/* loading */
#loader{position:fixed;inset:0;background:#060E1A;display:flex;align-items:center;justify-content:center;color:var(--accent);font-size:22px;z-index:999;font-family:'Cairo',sans-serif}
</style>
</head>
<body>
<div id="loader">جَارِي التَّحْمِيلُ…</div>
<canvas id="stars-bg"></canvas>

<!-- ═══ HOME ═══ -->
<div id="home">
  <div class="home-header">
    <div class="home-brand">أَبْطَالٌ فِي الظِّلِّ</div>
    <div class="home-tagline">سِيَرُ الجُنُودِ المَجْهُولِينَ مِنْ صَحَابَةِ رَسُولِ اللهِ ﷺ</div>
    <div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-top:14px;flex-wrap:wrap">
      <span style="font-family:'Cairo',sans-serif;font-size:12px;color:rgba(168,204,64,.7);background:rgba(168,204,64,.08);border:1px solid rgba(168,204,64,.2);border-radius:20px;padding:4px 14px">📖 ٨ قِصَصٍ مُصَوَّرَةٍ</span>
      <span style="font-family:'Cairo',sans-serif;font-size:12px;color:rgba(168,204,64,.7);background:rgba(168,204,64,.08);border:1px solid rgba(168,204,64,.2);border-radius:20px;padding:4px 14px">🔊 رِوَايَةٌ صَوْتِيَّةٌ</span>
      <span style="font-family:'Cairo',sans-serif;font-size:12px;color:rgba(168,204,64,.7);background:rgba(168,204,64,.08);border:1px solid rgba(168,204,64,.2);border-radius:20px;padding:4px 14px">🌐 عَرَبِيٌّ · English</span>
    </div>
  </div>
  <div class="home-section-title">🌿 اخْتَرْ قِصَّةً</div>
  <div class="cards-grid" id="cardsGrid"></div>
</div>

<!-- ═══ STORY VIEWER ═══ -->
<div id="viewer">
  <div class="viewer-topbar">
    <button class="v-back" id="vBack" aria-label="العودة">→</button>
    <span class="v-series" id="vSeries">🌿 أَبْطَالٌ فِي الظِّلِّ</span>
    <span class="v-counter" id="vCounter">١ / ١</span>
    <span class="v-tts" id="vTts" role="button" tabindex="0">🔊 صَوْت</span>
  </div>
  <div id="v-stage"></div>
  <div class="v-progress" id="vProgress"></div>
  <div class="v-controls">
    <button class="ctrl" id="vPrev" aria-label="السابق" disabled>◀</button>
    <button class="ctrl" id="vPlay" aria-label="تشغيل">▶</button>
    <button class="ctrl sm" id="vSpeak" aria-label="استماع">🔊</button>
    <button class="ctrl" id="vNext" aria-label="التالي">▶</button>
  </div>
</div>

<script>
'use strict';

/* ═══════════════════════════════════════════════
   ANIMATED STARS BACKGROUND
═══════════════════════════════════════════════ */
(function(){
  var c=document.getElementById('stars-bg'),ctx=c.getContext('2d'),pts=[];
  function resize(){c.width=innerWidth;c.height=innerHeight}
  function init(){pts=[];for(var i=0;i<110;i++)pts.push({x:Math.random(),y:Math.random()*.6,r:.4+Math.random()*1.2,o:.12+Math.random()*.5,sp:.3+Math.random()*.9,ph:Math.random()*Math.PI*2})}
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    var now=Date.now()/1000;
    for(var i=0;i<pts.length;i++){var p=pts[i];var op=p.o*(.7+.3*Math.sin(now*p.sp+p.ph));ctx.beginPath();ctx.arc(p.x*c.width,p.y*c.height,p.r,0,Math.PI*2);ctx.fillStyle='rgba(200,230,140,'+op+')';ctx.fill()}
    requestAnimationFrame(draw)
  }
  init();resize();window.addEventListener('resize',resize);draw();
})();

/* ═══════════════════════════════════════════════
   SVG SCENE LIBRARY
   Colour tokens: navy #040C18, dark-green #0E1E08, 
   accent-green #5A8C28, gold #C8A830
═══════════════════════════════════════════════ */
var SVG = (function(){
  var D = '<defs>'
    +'<linearGradient id="gNight" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#020810"/><stop offset="100%" stop-color="#0A1A06"/></linearGradient>'

/* ═══════════════════════════════════════════════
   APP STATE & TTS ENGINE
═══════════════════════════════════════════════ */
var state = {storyIdx:-1,slideIdx:0,autoPlay:false,ttsReady:false,arVoice:null,voiceDone:false,speaking:false,gen:0};

function initTTS(){
  var chip=document.getElementById('vTts');
  if(!('speechSynthesis' in window)){chip.textContent='🔇 غير متاح';return}
  function load(){
    var v=speechSynthesis.getVoices();
    if(v.length&&!state.voiceDone){
      state.voiceDone=true;state.ttsReady=true;
      state.arVoice=v.find(function(x){return/^ar/i.test(x.lang)});
      chip.textContent=state.arVoice?'🔊 اضغط للاستماع':'🔊 صَوْت';
      speechSynthesis.cancel();
    }
  }
  load();
  if(speechSynthesis.onvoiceschanged!==undefined)speechSynthesis.onvoiceschanged=load;
  var n=0,t=setInterval(function(){if(state.voiceDone||n>40){clearInterval(t)}else{load();n++}},200);
}

function stopTTS(){
  if('speechSynthesis' in window)speechSynthesis.cancel();
  state.speaking=false;state.gen++;
  document.getElementById('vTts').classList.remove('speaking');
}

// Continuous narrator: queue all remaining slides from `from`
function queueNarration(fromIdx){
  stopTTS();
  if(!state.ttsReady)return;
  var g=++state.gen;
  var story=STORIES[state.storyIdx];
  if(!story)return;
  var slides=story.slides;
  var av=state.arVoice;

  for(var i=fromIdx;i<slides.length;i++){
    var text=getSlideNarration(slides[i]);
    if(!text)continue;
    var u=new SpeechSynthesisUtterance(text);
    u.lang=av?av.lang:'ar-SA';u.rate=0.88;u.pitch=1.0;
    if(av)u.voice=av;
    u['_si']=i;
    u.onstart=(function(si,gen){return function(){
      if(gen!==state.gen)return;
      state.speaking=true;
      document.getElementById('vTts').classList.add('speaking');
      // Advance slide in sync with narrator
      if(si!==state.slideIdx){state.slideIdx=si;renderSlide();}
    }})(i,g);
    u.onend=(function(si,gen,last){return function(){
      if(gen!==state.gen)return;
      if(last){state.speaking=false;state.autoPlay=false;updatePlayBtn();document.getElementById('vTts').classList.remove('speaking');}
    }})(i,g,i===slides.length-1);
    u.onerror=function(){document.getElementById('vTts').classList.remove('speaking')};
    try{speechSynthesis.speak(u)}catch(e){}
  }
}

function getSlideNarration(s){
  if(!s)return'';
  var t=s.nar||'';
  if(s.type==='hadith'&&s.hadith&&!s.nar)t=(s.ar||'')+' '+(s.hadith||'')+' '+(s.response||'');
  return t;
}

// Unique tint colours per story so same-image cards look distinct
var TINTS = [
  'rgba(200,168,48,.0)',    // 0 intro — gold (has own layout)
  'rgba(30,100,180,.18)',   // 1 hubab — blue tint (wells/water)
  'rgba(80,40,120,.22)',    // 2 nuaym — purple (spy/night)
  'rgba(20,120,80,.20)',    // 3 rabia — green (garden/prayer)
  'rgba(180,60,20,.22)',    // 4 amr — red/orange (battle)
  'rgba(20,80,160,.20)',    // 5 dhu — deep blue (desert night)
  'rgba(100,160,20,.18)',   // 6 julaybib — bright green (honour)
  'rgba(20,140,120,.22)',   // 7 silah — teal (water miracle)
  'rgba(180,130,0,.22)',    // 8 dahdah — amber (golden garden)
];

function renderHome(){
  var g=document.getElementById('cardsGrid');g.innerHTML='';
  STORIES.forEach(function(story,idx){
    var card=document.createElement('div');
    var captured=idx;

    if(idx===0){
      // ── مقدمة المشروع — كارت بانر خاص ──
      card.className='story-card card-intro';
      card.innerHTML=
        '<div class="card-intro-inner">'
          +'<div class="card-intro-img"><img src="'+story.img+'" alt="مقدمة المشروع"></div>'
          +'<div class="card-intro-body">'
            +'<div class="card-intro-badge">🌿 '+story.badge+'</div>'
            +'<div class="card-intro-title">'+story.title+'</div>'
            +'<div class="card-intro-sub">لماذا يختبئ الأبطال؟ رِحْلَةٌ فِي سِيَرِ مَنْ عَمِلُوا فِي صَمْتٍ وَصَنَعُوا التَّارِيخَ</div>'
            +'<div class="card-intro-cta">▶ ابدأ هنا <span style="opacity:.6;font-size:11px">· مُقَدِّمَةُ المَشْرُوعِ</span></div>'
          +'</div>'
        +'</div>';
    } else {
      // ── كروت الصحابة — صورة + tint مميز + نص ──
      var tint = TINTS[idx] || 'rgba(0,0,0,0)';
      card.className='story-card';
      card.innerHTML=
        '<div class="card-img-wrap">'
          +'<img class="card-img" src="'+story.img+'" alt="" loading="lazy">'
          +'<div class="card-img-tint" style="background:'+tint+'"></div>'
        +'</div>'
        +'<div class="card-body">'
          +'<div class="card-badge">'+story.badge+'</div>'
          +'<div class="card-title">'+story.title+'</div>'
          +'<div class="card-subtitle">'+story.en+'</div>'
        +'</div>';
    }

    card.addEventListener('click',function(){openStory(captured)});
    g.appendChild(card);
  });
}

/* ═══════════════════════════════════════════════
   OPEN / CLOSE STORY
═══════════════════════════════════════════════ */
function openStory(idx){
  stopTTS();
  state.storyIdx=idx;state.slideIdx=0;state.autoPlay=false;
  document.getElementById('home').style.display='none';
  var v=document.getElementById('viewer');v.classList.add('open');
  buildDots();renderSlide();updatePlayBtn();
  document.getElementById('vBack').onclick=closeViewer;
  setTimeout(initTTS,400);
}
function closeViewer(){
  stopTTS();state.storyIdx=-1;
  document.getElementById('viewer').classList.remove('open');
  document.getElementById('home').style.display='flex';
}

/* ═══════════════════════════════════════════════
   RENDER SLIDE
═══════════════════════════════════════════════ */
function buildDots(){
  var bar=document.getElementById('vProgress');bar.innerHTML='';
  var story=STORIES[state.storyIdx];if(!story)return;
  story.slides.forEach(function(_,i){var d=document.createElement('div');d.className='dot';bar.appendChild(d)});
}

function renderSlide(){
  var story=STORIES[state.storyIdx];if(!story)return;
  var slides=story.slides,i=state.slideIdx,s=slides[i];
  if(!s)return;

  var total=slides.length;
  document.getElementById('vCounter').textContent=arNum(i+1)+' / '+arNum(total);
  document.getElementById('vSeries').textContent='🌿 '+story.title;

  // dots
  var dots=document.getElementById('vProgress').children;
  for(var d=0;d<dots.length;d++){dots[d].className='dot';if(d<i)dots[d].classList.add('done');if(d===i)dots[d].classList.add('active')}

  // buttons
  document.getElementById('vPrev').disabled=i===0;
  document.getElementById('vNext').disabled=i===total-1;

  // HTML
  var html=buildSlideHTML(s,i);
  var stage=document.getElementById('v-stage');
  var el=document.createElement('div');el.className='slide';el.innerHTML=html;
  stage.innerHTML='';stage.appendChild(el);
  requestAnimationFrame(function(){requestAnimationFrame(function(){el.classList.add('active')})});
}

function buildSlideHTML(s,idx){
  var numBadge='<div class="s-scene-num">'+arNum(s.sceneIdx||0)+'</div>';

  // ── image panel (shared across scene/hadith/intro-with-scene)
  function imgPanel(){
    var inner='';
    if(s.sceneImg){inner='<img src="'+s.sceneImg+'" alt="" style="width:100%;height:100%;object-fit:cover;display:block"><div class="s-img-overlay"></div>'}
    else if(s.scene&&SVG[s.scene]){inner=SVG[s.scene]()}
    return'<div class="s-img">'+inner+(s.sceneIdx?numBadge:'')+'</div>';
  }

  if(s.type==='cover'){
    var bgSvg=s.scene&&SVG[s.scene]?'<div style="position:absolute;inset:0;opacity:.45;z-index:0">'+SVG[s.scene]()+'</div>':'';
    return'<div class="s-night" style="position:relative;overflow:hidden">'
      +bgSvg
      +'<div style="position:relative;z-index:1;display:flex;flex-direction:column;align-items:center">'
      +'<div class="cover-icon">'+(s.icon||'🌿')+'</div>'
      +'<div class="cover-title">'+s.title+'</div>'
      +'<div class="cover-sub">'+s.sub+'</div>'
      +'<div class="cover-en">'+s.subEn+'</div>'
      +'<div class="cover-badge">أَبْطَالٌ فِي الظِّلِّ</div>'
      +(s.src?'<div class="src-line">'+s.src+'</div>':'')
      +'</div>'
      +'</div>';
  }
  if(s.type==='intro'){
    var imgH='';
    if(s.scene&&SVG[s.scene])imgH='<div class="s-img" style="border-radius:18px 18px 0 0">'+SVG[s.scene]()+'</div>';
    var linesH=s.lines.map(function(l){
      return'<div class="intro-line">'+l.ar+'</div>'
        +'<div class="intro-en">'+l.en+'</div>'
        +'<div style="width:36px;height:1px;background:rgba(90,140,40,.3);margin:4px auto 8px"></div>';
    }).join('');
    return imgH+'<div class="s-caption"><div class="s-caption-inner">'+linesH+'</div></div>';
  }
  if(s.type==='scene'){
    return imgPanel()
      +'<div class="s-caption"><div class="s-caption-inner">'
      +'<div class="s-ar">'+s.ar+'</div>'
      +'<div class="s-divider"></div>'
      +'<div class="s-en">'+s.en+'</div>'
      +'</div></div>';
  }
  if(s.type==='hadith'){
    return imgPanel()
      +'<div class="s-caption"><div class="s-caption-inner">'
      +'<div class="s-ar" style="font-size:clamp(13px,2.4vw,18px);margin-bottom:6px">'+s.ar+'</div>'
      +'<div class="hadith-wrap">'
      +'<div class="hadith-ar">'+s.hadith+'</div>'
      +(s.response?'<div class="hadith-response">'+s.response+'</div>':'')
      +'<div class="hadith-src">'+s.src+'</div>'
      +'</div>'
      +'<div class="s-en">'+s.en+'</div>'
      +'</div></div>';
  }
  if(s.type==='morals'){
    var itemsH=s.items.map(function(m,mi){
      return'<div class="moral-row">'
        +'<div class="moral-num">'+arNum(mi+1)+'</div>'
        +'<div style="flex:1">'
          +'<div class="moral-ar">'+m.ar+'</div>'
          +'<div class="moral-en">'+m.en+'</div>'
        +'</div>'
        +'</div>';
    }).join('');
    return'<div class="s-night" style="justify-content:flex-start;padding-top:clamp(14px,3vw,24px)">'
      +'<div style="font-size:clamp(36px,7vw,52px);margin-bottom:8px;filter:drop-shadow(0 0 12px rgba(168,204,64,.4))">⚖️</div>'
      +'<div class="morals-title">الدُّرُوسُ المُسْتَفَادَةُ</div>'
      +'<div style="width:100%;overflow-y:auto;padding:0 2px">'+itemsH+'</div>'
      +'</div>';
  }
  if(s.type==='closing'){
    var bgSvg2=SVG['finalDawn']?'<div style="position:absolute;inset:0;opacity:.35;z-index:0">'+SVG['finalDawn']()+'</div>':'';
    return'<div class="s-night" style="position:relative;overflow:hidden">'
      +bgSvg2
      +'<div style="position:relative;z-index:1;display:flex;flex-direction:column;align-items:center">'
      +'<div class="closing-icon">'+(s.icon||'🌿')+'</div>'
      +'<div class="closing-title">'+s.ar+'</div>'
      +'<div class="closing-quote">'+s.quote+'</div>'
      +'<div class="closing-en">'+s.en+'</div>'
      +'<button class="home-btn" onclick="closeViewer()">← العَوْدَةُ إِلَى القِصَصِ</button>'
      +'</div>'
      +'</div>';
  }
  return'';
}

/* ═══════════════════════════════════════════════
   CONTROLS
═══════════════════════════════════════════════ */
function updatePlayBtn(){document.getElementById('vPlay').textContent=state.autoPlay?'⏸':'▶'}

function goTo(i){
  var story=STORIES[state.storyIdx];if(!story)return;
  if(i<0||i>=story.slides.length)return;
  stopTTS();state.slideIdx=i;state.autoPlay=false;updatePlayBtn();renderSlide();
}

document.getElementById('vPrev').addEventListener('click',function(){goTo(state.slideIdx-1)});
document.getElementById('vNext').addEventListener('click',function(){goTo(state.slideIdx+1)});
document.getElementById('vPlay').addEventListener('click',function(){
  state.autoPlay=!state.autoPlay;updatePlayBtn();
  if(state.autoPlay)queueNarration(state.slideIdx);else stopTTS();
});
document.getElementById('vSpeak').addEventListener('click',function(){stopTTS();queueNarration(state.slideIdx)});
document.getElementById('vTts').addEventListener('click',function(){stopTTS();queueNarration(state.slideIdx)});

// Touch swipe
(function(){
  var tx=0,ty=0,stage=document.getElementById('v-stage');
  stage.addEventListener('touchstart',function(e){tx=e.touches[0].clientX;ty=e.touches[0].clientY},{passive:true});
  stage.addEventListener('touchend',function(e){
    var dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
    if(Math.abs(dx)>Math.abs(dy)+10&&Math.abs(dx)>42){
      if(dx<0)goTo(state.slideIdx+1);else goTo(state.slideIdx-1);
    }
  },{passive:true});
})();

// Keyboard
document.addEventListener('keydown',function(e){
  if(state.storyIdx<0)return;
  if(e.key==='ArrowRight')goTo(state.slideIdx-1);
  if(e.key==='ArrowLeft')goTo(state.slideIdx+1);
  if(e.key===' '){e.preventDefault();document.getElementById('vPlay').click();}
  if(e.key==='Escape')closeViewer();
});

/* ═══════════════════════════════════════════════
   BOOT
═══════════════════════════════════════════════ */
renderHome();
document.getElementById('loader').style.display='none';
setTimeout(initTTS,600);

// PWA Service Worker
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('./sw.js').catch(function(){});
  });
}
</script>
